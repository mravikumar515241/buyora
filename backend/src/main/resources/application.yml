spring:
  application:
    name: buyora-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5433/buyora_db}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
    open-in-view: false
  jackson:
    time-zone: UTC
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${SERVER_PORT:8080}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:3001,http://127.0.0.1:3001,http://localhost:3002,http://127.0.0.1:3002,http://localhost:3003,http://127.0.0.1:3003}

jwt:
  secret: ${JWT_SECRET:BuyoraSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLongForHS256}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

razorpay:
  key-id: ${RAZORPAY_KEY_ID:}
  key-secret: ${RAZORPAY_KEY_SECRET:}

# TODO: PRODUCTION - Password Reset Configuration
# Configure these environment variables before production deployment:
# 
# app.frontend-url:
#   - Set to your production frontend URL (e.g., https://buyora.com)
#   - Used in password reset email links
#   - Default: http://localhost:3001 (development only)
# 
# app.reset-token-expiry-minutes:
#   - Token expiration time in minutes
#   - Default: 15 minutes (recommended: 5-15 minutes)
#   - Shorter = more secure, but less user-friendly
#   - Longer = more user-friendly, but less secure
# 
# Security recommendation:
#   - Use 10 minutes for high-security applications
#   - Use 15 minutes for standard applications
#   - Never exceed 30 minutes
app:
  frontend-url: ${FRONTEND_URL:http://localhost:3001}
  reset-token-expiry-minutes: ${RESET_TOKEN_EXPIRY_MINUTES:15}
  inventory:
    reservation-expiry-minutes: ${INVENTORY_RESERVATION_EXPIRY_MINUTES:15}

